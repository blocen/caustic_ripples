<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pool Caustics</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #04323b; }
  #gl { display: block; width: 100vw; height: 100vh; }

  #panel {
    position: fixed; left: 16px; bottom: 16px;
    display: flex; flex-direction: column; gap: 12px;
    padding: 14px 16px; border-radius: 14px;
    background: rgba(4, 30, 36, 0.45);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    font: 13px/1.3 -apple-system, system-ui, sans-serif;
    color: #eafdff; user-select: none; max-width: min(320px, 90vw);
  }
  #panel.hidden { opacity: 0; pointer-events: none; transform: translateY(8px); }
  #panel { transition: opacity .25s, transform .25s; }
  .row { display: flex; align-items: center; gap: 10px; }
  .row label { flex: 0 0 78px; opacity: .85; }
  input[type=range] { flex: 1; accent-color: #6fe9ff; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.5); cursor: pointer;
  }
  .swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,.35); }
  input[type=color] { width: 34px; height: 26px; border: none; background: none; cursor: pointer; }
  .hint { opacity: .55; font-size: 11px; }
  button.ghost {
    align-self: flex-start; background: rgba(255,255,255,.1); color: inherit;
    border: 1px solid rgba(255,255,255,.18); border-radius: 8px;
    padding: 5px 10px; cursor: pointer; font: inherit;
  }
  #title {
    position: fixed; top: 2rem; left: 0; right: 0;
    pointer-events: none; padding: 0 1rem; text-align: center;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-weight: 500; font-size: clamp(1.1rem, 3vw, 1.8rem);
    letter-spacing: .12em; text-transform: uppercase;
    background: linear-gradient(90deg, #cdedff, #7fc8ff, #4f9df0);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 0 12px rgba(111, 200, 255, .35));
    opacity: 0; transition: opacity 2s ease;
  }
  #title.show { opacity: 1; }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div id="title"></div>

<div id="panel">
  <div class="row" style="font-weight:600; flex:initial;">Pool Caustics
    <span class="hint" style="margin-left:auto;">press&nbsp;H&nbsp;to&nbsp;hide</span>
  </div>
  <div class="row">
    <label>Water color</label>
    <input type="color" id="picker" value="#1f97a8" />
    <div class="swatches" id="swatches"></div>
  </div>
  <div class="row"><label>Speed</label><input type="range" id="speed" min="0" max="2" step="0.01" value="0.5" /></div>
  <div class="row"><label>Caustics</label><input type="range" id="intensity" min="0" max="2" step="0.01" value="1" /></div>
  <div class="row"><label>Rainbow</label><input type="range" id="chroma" min="0" max="3" step="0.01" value="1" /></div>
  <div class="row"><label>Tile size</label><input type="range" id="tile" min="2" max="14" step="0.1" value="6.5" /></div>
  <div class="row"><label>Ripple</label><input type="range" id="distort" min="0" max="2" step="0.01" value="1" /></div>
  <div class="row"><label>Quality</label><input type="range" id="quality" min="0.5" max="2" step="0.05" value="1" /></div>
</div>

<script id="vert" type="x-shader/x-vertex">
attribute vec2 p;
void main() { gl_Position = vec4(p, 0.0, 1.0); }
</script>

<script id="frag" type="x-shader/x-fragment">
precision highp float;

uniform vec2  u_res;
uniform float u_time;
uniform vec3  u_color;      // base water color (linear-ish)
uniform float u_intensity;  // caustics brightness
uniform float u_chroma;     // chromatic aberration amount
uniform float u_tile;       // tiles across the view
uniform float u_distort;    // ripple/refraction strength

// hash + value noise
float hash(vec2 p){ p = fract(p*vec2(123.34, 456.21)); p += dot(p, p+45.32); return fract(p.x*p.y); }
float noise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(hash(i+vec2(0,0)), hash(i+vec2(1,0)), u.x),
             mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), u.x), u.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for(int i=0;i<3;i++){ s += a*noise(p); p *= 2.02; a *= 0.5; }
  return s;
}

// Convergence-style caustics: iterative wave folding focuses "light" into bright
// filaments with soft cores and dark gaps — the way refracted sunlight actually pools.
float caustic(vec2 uv, float t){
  vec2 p = mod(uv * 6.2831853, 6.2831853) - 250.0;
  vec2 i = p;
  float c = 1.0;
  const float inten = 0.0045;
  for(int n = 0; n < 4; n++){
    float tt = t * (1.0 - (3.5 / float(n + 1)));
    i = p + vec2(cos(tt - i.x) + sin(tt + i.y),
                 sin(tt - i.y) + cos(tt + i.x));
    c += 1.0 / length(vec2(p.x / (sin(i.x + tt) / inten),
                           p.y / (cos(i.y + tt) / inten)));
  }
  c /= 4.0;
  c = 1.17 - pow(c, 1.4);
  return clamp(pow(abs(c), 6.0), 0.0, 1.5);
}

// Procedural tiled pool floor (sampled per color channel for true dispersion).
vec3 floorColor(vec2 uv, float t){
  vec2 tuv = uv * u_tile;
  vec2 cell = abs(fract(tuv) - 0.5);
  float line = max(cell.x, cell.y);
  float grout = smoothstep(0.43, 0.49, line);          // 1 on tile, 0 in grout
  float marble = fbm(tuv * 2.6 + 7.0);
  vec3 tile  = u_color * (0.78 + 0.32 * marble);
  vec3 grsh  = u_color * 0.16;                          // dark grout lines
  return mix(grsh, tile, grout);
}

// Surface normal from layered ripples -> refraction vector (finite-difference gradient).
float surfH(vec2 uv, float t){
  return fbm(uv * 3.0 + vec2(0.0, t * 0.18))
       + 0.5 * fbm(uv * 6.0 - vec2(t * 0.12, 0.0));   // crossing chop
}
vec2 refractOffset(vec2 uv, float t){
  float e = 0.01;
  float h  = surfH(uv, t);
  float hx = surfH(uv + vec2(e, 0.0), t);
  float hy = surfH(uv + vec2(0.0, e), t);
  return vec2(hx - h, hy - h) / e;
}

void main(){
  vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / u_res.y;
  float t = u_time;

  // big slow swell that warps the whole floor + small fast chop
  vec2 swell = vec2(fbm(uv * 2.0 + vec2(0.0,  t * 0.10)),
                    fbm(uv * 2.0 + vec2(7.3, -t * 0.08))) - 0.5;
  vec2 grad = refractOffset(uv, t);
  vec2 refr = (swell * 0.10 + grad * 0.06) * u_distort;

  // depth: deeper water => darker, slightly blurs the floor detail
  float depth = fbm(uv * 1.4 - t * 0.04);
  float darken = mix(0.45, 1.05, depth);

  // --- refracted floor with per-channel chromatic dispersion ---
  float ca = (0.010 + 0.012 * length(refr)) * u_chroma;
  vec2 dir = normalize(refr + 1e-4);
  vec2 wuv = uv + refr;
  vec3 col;
  col.r = floorColor(wuv + dir * ca, t).r;
  col.g = floorColor(wuv,            t).g;
  col.b = floorColor(wuv - dir * ca, t).b;
  col *= darken;

  // --- caustic light (single sample; rainbow faked from surface slope) ---
  vec2 cuv = (uv + refr * 0.6) * 2.6;
  float cg = caustic(cuv, t) * u_intensity;
  float disp = clamp(length(refr) * 2.5 * u_chroma, 0.0, 1.0);
  vec3 tint = 0.5 + 0.5 * cos(6.2831 * (disp + vec3(0.0, 0.33, 0.67)));
  vec3 lightTint = mix(vec3(0.55, 0.95, 1.0), tint, disp * 0.6);
  vec3 caus = cg * lightTint;

  vec3 lit = col + caus;

  // specular surface sparkle where caustics peak
  lit += pow(cg, 3.0) * vec3(0.7, 0.9, 1.0) * 0.5;
  // soft bloom feel: lift mids a touch
  lit += cg * cg * 0.15;

  // vignette + faint edge darkening like a real photo
  lit *= 1.0 - 0.28 * dot(uv, uv);

  // filmic tonemap + gamma
  lit = (lit * (2.51 * lit + 0.03)) / (lit * (2.43 * lit + 0.59) + 0.14);
  lit = pow(clamp(lit, 0.0, 1.0), vec3(0.9));

  // subtle sensor grain to kill the "too clean CG" look
  float grain = (hash(gl_FragCoord.xy + t) - 0.5) * 0.04;
  lit += grain;

  gl_FragColor = vec4(clamp(lit, 0.0, 1.0), 1.0);
}
</script>

<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl", { antialias: true, preserveDrawingBuffer: false });
if (!gl) { document.body.innerHTML = "<p style='color:#fff;padding:2rem;font:16px sans-serif'>WebGL not available in this browser.</p>"; throw new Error("no webgl"); }

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, document.getElementById("vert").textContent));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, document.getElementById("frag").textContent));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
const loc = gl.getAttribLocation(prog, "p");
gl.enableVertexAttribArray(loc);
gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

const U = name => gl.getUniformLocation(prog, name);
const u = {
  res: U("u_res"), time: U("u_time"), color: U("u_color"),
  intensity: U("u_intensity"), chroma: U("u_chroma"),
  tile: U("u_tile"), distort: U("u_distort"),
};

// ---- controls ----
const els = {
  picker: document.getElementById("picker"),
  speed: document.getElementById("speed"),
  intensity: document.getElementById("intensity"),
  chroma: document.getElementById("chroma"),
  tile: document.getElementById("tile"),
  distort: document.getElementById("distort"),
  quality: document.getElementById("quality"),
};

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [((n>>16)&255)/255, ((n>>8)&255)/255, (n&255)/255];
}

const presets = ["#1f97a8", "#0e6e7a", "#1bb39a", "#2e6fb0", "#0d4f7a", "#157a8c", "#3aa0c9", "#0a3d4a"];
const sw = document.getElementById("swatches");
function setActive(hex) {
  [...sw.children].forEach(c => c.classList.toggle("active", c.dataset.hex.toLowerCase() === hex.toLowerCase()));
}
presets.forEach(hex => {
  const d = document.createElement("div");
  d.className = "swatch"; d.style.background = hex; d.dataset.hex = hex;
  d.onclick = () => { els.picker.value = hex; setActive(hex); };
  sw.appendChild(d);
});
setActive(els.picker.value);
els.picker.addEventListener("input", () => setActive(els.picker.value));

// hide panel with H
addEventListener("keydown", e => {
  if (e.key === "h" || e.key === "H") document.getElementById("panel").classList.toggle("hidden");
});

function resize() {
  // Quality slider scales render resolution; capped well below native to stay fast.
  const dpr = Math.min(devicePixelRatio || 1, 1.25) * parseFloat(els.quality.value);
  canvas.width = Math.max(1, Math.floor(innerWidth * dpr));
  canvas.height = Math.max(1, Math.floor(innerHeight * dpr));
  gl.viewport(0, 0, canvas.width, canvas.height);
}
addEventListener("resize", resize);
els.quality.addEventListener("input", resize);
resize();

let t = 0, last = performance.now();
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.05); last = now;
  t += dt * parseFloat(els.speed.value);

  gl.uniform2f(u.res, canvas.width, canvas.height);
  gl.uniform1f(u.time, t);
  gl.uniform3fv(u.color, hexToRgb(els.picker.value));
  gl.uniform1f(u.intensity, parseFloat(els.intensity.value));
  gl.uniform1f(u.chroma, parseFloat(els.chroma.value));
  gl.uniform1f(u.tile, parseFloat(els.tile.value));
  gl.uniform1f(u.distort, parseFloat(els.distort.value));

  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// timed title overlay: slow fade-in, slow crossfade to new text, slow fade-out
const titleEl = document.getElementById("title");
setTimeout(() => { titleEl.textContent = "pool caustics"; titleEl.classList.add("show"); }, 5000);
setTimeout(() => {
  titleEl.classList.remove("show");
  setTimeout(() => { titleEl.textContent = "private SPA caustics"; titleEl.classList.add("show"); }, 2000);
}, 10000);
setTimeout(() => { titleEl.classList.remove("show"); }, 30000);
</script>
</body>
</html>
